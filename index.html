<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Кошкин дом — викторина по сказке</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="top">
    <div class="brand">
      <div class="badge">Сказка</div>
      <div>
        <h1>Кошкин дом</h1>
        <p>Викторина по сказке С. Я. Маршака</p>
      </div>
    </div>
    <div class="cta">
      <button class="btn ghost" id="toggleAnim">Анимации: вкл</button>
      <button class="btn" id="audioToggle">Озвучка: авто</button>
    </div>
  </header>

  <main class="layout">

    <!-- Экран выбора теста -->
    <section class="card home" id="screenHome" aria-live="polite">
      <div class="home-split">
        <div class="home-cover">
          <img src="images/cover.png" alt="Кошкин дом — викторина по сказке" />
        </div>
        <div class="home-tests">
          <h2>Выбор теста</h2>
          <p class="muted">Сейчас доступен один тест, позже добавим новые сказки.</p>
          <div class="test-list">
            <button class="test-card" id="testKoshkin">
              <span class="test-title">Кошкин дом</span>
              <span class="test-sub">3 раунда по 3 вопроса</span>
            </button>
            <div class="test-card disabled" aria-disabled="true">
              <span class="test-title">Скоро новые сказки</span>
              <span class="test-sub">Появятся в будущем</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Экран приветствия -->
    <section class="card intro hidden" id="screenIntro" aria-live="polite">
      <div class="intro-split">
        <img class="intro-hero" src="images/макаримушка машет.png" alt="Макаримушка" />
        <div class="intro-content">
          <h2>Приветствие</h2>
          <p class="intro-text" id="introText"></p>
          <button class="btn" id="introStartBtn">Начать викторину</button>
        </div>
        <img class="intro-hero" src="images/кролик машет.png" alt="Кролик Ириска" />
      </div>
    </section>

    <!-- Экран объявления раунда -->
    <section class="card round-announce hidden" id="screenRound" aria-live="polite">
      <div class="round-badge" id="roundTitle">Раунд 1</div>
      <h2 class="round-subtitle" id="roundSubtitle">«Кто есть кто?»</h2>
      <p id="roundInfo" class="round-info"></p>
      <button class="btn" id="roundStartBtn">Начать раунд</button>
    </section>

    <!-- Экран вопроса -->
    <section class="card quiz hidden" id="screenQuiz" aria-live="polite">
      <div class="quiz-head">
        <div class="progress">
          <div class="bar" id="progressBar"></div>
        </div>
        <div class="counter" id="counter">Вопрос 1 из 9</div>
      </div>

      <h2 id="questionText">Вопрос</h2>

      <div class="controls">
        <button class="btn speak" id="speakQuestionBtn">Озвучить вопрос</button>
      </div>

      <div class="feedback" id="feedback" role="alert" aria-live="assertive"></div>

      <!-- Ответы + герой сбоку -->
      <div class="answers-row" id="answersRow">
        <img id="quizHero" class="quiz-hero" alt="" />
        <div class="answers" id="answers"></div>
      </div>

      <div class="quiz-foot">
        <button class="btn ghost" id="prevBtn">Назад</button>
        <div class="quiz-foot-right">
          <div class="loader-wrap hidden" id="loaderWrap">
            <div class="loader-ring">
              <svg viewBox="0 0 48 48" class="loader-svg">
                <circle cx="24" cy="24" r="20" class="loader-bg" fill="none" stroke="#e3f2fd" stroke-width="4" />
                <circle cx="24" cy="24" r="20" class="loader-fg" fill="none" stroke="#1565c0" stroke-width="4"
                  stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" />
              </svg>
            </div>
            <span class="loader-text" id="loaderCountdown"></span>
          </div>
          <button class="btn" id="nextBtn" disabled>Дальше</button>
        </div>
      </div>
    </section>

    <!-- Экран результата -->
    <section class="card result hidden" id="screenResult" aria-live="polite">
      <div class="result-split">
        <img class="result-hero" src="images/макаримушка поздравляет.png" alt="Макаримушка" />
        <div class="result-content">
          <h2 id="resultTitle">Поздравляем!</h2>
          <p class="result-text" id="resultText"></p>
          <div class="result-actions">
            <button class="btn" id="restartBtn">Пройти ещё раз</button>
            <button class="btn ghost" id="homeBtn">К списку тестов</button>
          </div>
        </div>
        <img class="result-hero" src="images/кролик поздравляет.png" alt="Кролик Ириска" />
      </div>

      <div class="confetti-container" id="confettiContainer" aria-hidden="true"></div>
    </section>

  </main>

  <footer class="footer">
    <span>Кошкин дом — викторина</span>
    <span>Сказка С. Я. Маршака</span>
  </footer>

  <div class="sr-only" id="liveRegion" aria-live="assertive"></div>

  <script src="script.js"></script>
</body>
</html>
